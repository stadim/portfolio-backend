<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased">

<div class="max-w-6xl mx-auto px-4 py-10">
    <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-5">
        <div>
            <h1 class="text-3xl font-bold text-white">Административен панел</h1>
            <p class="text-slate-400 text-sm">Управление на проектите в портфолиото</p>
        </div>
        <a th:href="@{/admin/projects/new}" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg font-medium text-sm transition">
            + Нов Проект
        </a>
    </div>

    <div class="bg-slate-850 border border-slate-800 rounded-xl overflow-hidden shadow-lg">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-slate-800/50 text-slate-400 text-xs font-semibold uppercase tracking-wider border-b border-slate-800">
                <th class="p-4">ID</th>
                <th class="p-4">Заглавие</th>
                <th class="p-4">Технологии</th>
                <th class="p-4 text-right">Действия</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-800 text-sm">
            <tr th:each="project : ${projects}" class="hover:bg-slate-800/30 transition">
                <td th:text="${project.id}" class="p-4 font-mono text-slate-500">1</td>
                <td th:text="${project.title}" class="p-4 font-semibold text-white">Заглавие</td>
                <td th:text="${project.technologies}" class="p-4 text-slate-400">Java, Spring</td>
                <td class="p-4 text-right space-x-3">
                    <a th:href="@{/admin/projects/edit/{id}(id=${project.id})}"
                       class="text-amber-400 hover:text-amber-300 font-medium transition">
                        Редактирай
                    </a>
                    <a th:href="@{/admin/projects/delete/{id}(id=${project.id})}"
                       onclick="return confirm('Сигурни ли сте, че искате да изтриете този проект?')"
                       class="text-rose-500 hover:text-rose-400 font-medium transition">
                        Изтрий
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-6">
        <a th:href="@{/}" class="text-sm text-indigo-400 hover:underline">&larr; Към началната страница</a>
    </div>
</div>

</body>
</html>
